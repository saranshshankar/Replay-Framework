name: perception
container: planner
colcon_package: realtime_perception
# Topic lists verified 2026-06-11 against KT/playbooks/01-perception.md Step 7 +
# .planning/research/verification/01-perception.md. Topics that are dead in sim are
# removed so count-based validity metrics don't flag false failures.
input_topics:
  - /perception_node/camera_0/image_raw
  - /perception_node/camera_1/image_raw
  - /perception_node/camera_2/image_raw
  - /perception_node/camera_3/image_raw
  - /perception_node/camera_4/image_raw
  - /perception_node/camera_5/image_raw
  - /perception_node/lidar_107/points
  - /perception_node/lidar_108/points
  # /perception_node/lidar_107/imu/data + lidar_108/imu/data removed: IMU disabled in sim.
  - /tf
  - /tf_static
output_topics:
  - /perception_node/camera_0/image_raw_sim
  - /perception_node/camera_1/image_raw_sim
  - /perception_node/camera_2/image_raw_sim
  - /perception_node/camera_3/image_raw_sim
  - /perception_node/camera_4/image_raw_sim
  - /perception_node/camera_5/image_raw_sim
  - /perception_node/camera_0/semantic_raw_sim
  - /perception_node/camera_1/semantic_raw_sim
  - /perception_node/camera_2/semantic_raw_sim
  - /perception_node/camera_3/semantic_raw_sim
  - /perception_node/camera_4/semantic_raw_sim
  - /perception_node/camera_5/semantic_raw_sim
  - /perception_node/camera_0/depth_raw_sim
  - /perception_node/camera_1/depth_raw_sim
  - /perception_node/camera_2/depth_raw_sim
  - /perception_node/camera_3/depth_raw_sim
  - /perception_node/camera_4/depth_raw_sim
  - /perception_node/camera_5/depth_raw_sim
  - /perception_node/colored_pointcloud_sim
  # Removed (no producer / live-only in sim): lidar_107/points_sim, lidar_108/points_sim,
  # pointcloud_merged_sim, lidar_107/imu/data_sim, lidar_108/imu/data_sim.
  # /diagnostics is NOT in the stock list but is required — the latency/pipeline
  # metrics read the module's self-reported diagnostics; it publishes with NO _sim suffix.
  - /perception_node/diagnostics
launch:
  command: "ros2 launch realtime_perception perception_node.launch.py use_replay:=true"

qos_override: configs/qos/perception.yaml

# Per-topic expected publish rate (substring match; default applies to cameras at 10 Hz,
# diagnostics is 0.2 Hz — report_interval_sec:5.0, contract §2). Faithfulness uses this so
# the 0.2 Hz diagnostics topic is no longer scanned against a flat 10 Hz (UAT gap 1).
expected_hz:
  default: 10.0
  diagnostics: 0.2
# The 6 depth output topics DepthMetric scans (32FC4); without this it falls back to ALL
# output topics and decodes rgb/semantic as depth (UAT gap 5).
depth_topics:
  - /perception_node/camera_0/depth_raw_sim
  - /perception_node/camera_1/depth_raw_sim
  - /perception_node/camera_2/depth_raw_sim
  - /perception_node/camera_3/depth_raw_sim
  - /perception_node/camera_4/depth_raw_sim
  - /perception_node/camera_5/depth_raw_sim
# The diagnostics topic LatencyMetric parses for seg_argmax compute time (contract §5).
diagnostics_topic: /perception_node/diagnostics

thresholds:
  validity:
    replay_max_gap_ms:
      max: 200
      provisional: true
    replay_drop_rate:
      max: 0.02
      provisional: true
  quality:
    latency_p95_ms:
      max: 50.0
      tolerance_band: 5.0
      provisional: true
    cross_camera_overlap_iou:
      min: 0.75
      tolerance_band: 0.03
      provisional: true
    # mask_iou_vs_golden is C1's primary comparison (pinned-golden; FP16 => never
    # bit-exact). The evaluator (01-07) reports it "skipped" with a warning while
    # no golden fixture exists yet (01-06 starts warning-only until curated bags land).
    mask_iou_vs_golden:
      min: 0.98
      provisional: true

mocks: []

preflight_assets:
  # host-side paths (the ~/.ros bind-mount source + the 10xCode tree); checked fail-fast before replay
  - ~/.ros/perception/models/L2_L4_segformer_B1_x86_b6_fp16.trt
  - ~/.ros/perception/calibration/camera_intrinsics/fisheye_rear/luts
  - ~/.ros/perception/calibration/camera_intrinsics/fisheye_top/luts
  - ~/.ros/perception/calibration/camera_intrinsics/fisheye_ft/luts
  - ~/.ros/perception/calibration/camera_intrinsics/fisheye_fb/luts
  - ~/.ros/perception/calibration/camera_intrinsics/fisheye_l/luts
  - ~/.ros/perception/calibration/camera_intrinsics/fisheye_r/luts
  - $TENXCODE_ROOT/version_system/config/current/param
