# DEPLOY TO: 10xCode  ->  .github/workflows/replay-perception-gate.yml
#
# The Module-wise Replay regression gate for perception, running INSIDE 10xCode CI.
# The replay framework (saranshshankar/Replay-Framework) is imported as a LIBRARY: this
# workflow checks it out, pip-installs it, and runs it against THIS PR's perception code.
#
# FLOWS (A4.1 / A4.2):
#   detect (always, neutral-skip)
#   └─ no incidents tagged  ->  replay (GPU, golden bag) -> metrics (cheap CPU) -> gate
#   └─ incidents tagged     ->  replay (GPU, incident bags — internal-branch guard)
#                                -> metrics (cheap CPU) -> mark (RDS fixed) -> gate
#
# SECURITY: safe `pull_request` event only (no secret-bearing target variant; T-0106-01).
# The privileged replay job is guarded by head.repo.full_name == github.repository (fork-
# PR secret-exfil mitigation; RESEARCH §2a). AWS auth is OIDC only (id-token: write;
# T-0106-02/T-0106-03). OIDC-only — no long-lived AWS keys.
name: replay-perception-gate

on:
  pull_request:
    paths:
      - 'perception/v2/realtime_perception/**'
  workflow_dispatch: {}

permissions:
  id-token: write        # AWS OIDC — S3-READ ONLY, to download the asset bundle (engine/LUTs/bag)
  contents: read
  packages: read         # GHCR image pull (10xCode's primary registry)
  pull-requests: write   # to surface the report and read the checklist comment

jobs:

  # ---------------------------------------------------------------------------
  # detect — always runs; neutral-skip when perception is untouched (A7 / RQ-4)
  # Holds NO secrets / NO GPU.  Emits two outputs:
  #   perception  — 'true' when perception source paths are changed
  #   incident_ids — space-separated list of ticked incident IDs (empty = golden path)
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      perception: ${{ steps.filter.outputs.perception }}
      incident_ids: ${{ steps.parse_incidents.outputs.incident_ids }}
    steps:
      - name: Checkout (shallow — paths-filter only needs the file tree)
        uses: actions/checkout@v4

      - name: Detect touched perception paths
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            perception:
              - 'perception/v2/realtime_perception/**'

      - name: Checkout the replay framework (for parse_ticked_incident_ids)
        uses: actions/checkout@v4
        with:
          repository: saranshshankar/Replay-Framework
          ref: main
          path: replay-framework
          token: ${{ secrets.FRAMEWORK_READ_TOKEN }}

      - name: Install framework (checklist parse only — no heavy extras)
        run: pip install -e "./replay-framework/module_replay"

      # Fetch the PR checklist comment and parse ticked incident IDs.
      # DB creds never reach this step — the gate resolves s3_bag_uri server-side (B3).
      # An empty output means: no incidents tagged -> golden branch (FR-9).
      - name: Parse ticked incident IDs from PR checklist comment
        id: parse_incidents
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let incident_ids = '';
            if (context.eventName === 'pull_request') {
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const body = comments.data.map(c => c.body || '').join('\n');
              try {
                const out = execSync(
                  `python3 -c "` +
                    `import sys; sys.path.insert(0,'replay-framework/module_replay'); ` +
                    `from replay.ci.incident_checklist import parse_ticked_incident_ids; ` +
                    `ids = parse_ticked_incident_ids(sys.stdin.read()); ` +
                    `print(' '.join(ids))` +
                  `"`,
                  { input: body, encoding: 'utf8' }
                ).trim();
                incident_ids = out;
              } catch (e) {
                core.warning('parse_ticked_incident_ids failed: ' + e.message);
              }
            }
            core.setOutput('incident_ids', incident_ids);
            core.info('incident_ids: ' + (incident_ids || '(none — golden path)'));

  # ---------------------------------------------------------------------------
  # replay — RunsOn GPU; privileged job (GPU + GHCR + S3 + INCIDENT_DB_URL).
  # INTERNAL-BRANCH GUARD: forks are withheld entirely (T-0106-01, RESEARCH §2a).
  # Branches on detect.outputs.incident_ids:
  #   empty  -> golden bag replay (existing path, unchanged)
  #   non-empty -> per-incident bag replay (sharded, not fail-fast — D-18)
  # ---------------------------------------------------------------------------
  replay:
    needs: detect
    # INTERNAL-BRANCH GUARD (T-0106-01, RESEARCH §2a): external-fork PRs skip this
    # privileged job entirely.  Fork maintainers must push internally to get GPU replay.
    if: >
      needs.detect.outputs.perception == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: runs-on=${{ github.run_id }}/runner=replay-gpu
    env:
      MODULE: perception
      FRAMEWORK_REF: main                          # pin a tag for reproducibility once cut
      REGISTRY: ghcr.io/originautonomy             # GHCR = 10xCode's primary registry (v2-docker-ci.yml)
      TENXCODE_ROOT: ${{ github.workspace }}       # the framework operates on THIS checkout
      BAG: ${{ vars.PERCEPTION_BAG_PATH }}         # e.g. /mnt/efs/bags/perception_ci (Part 10)
    steps:
      - name: Checkout 10xCode PR (with submodules)
        uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Checkout the replay framework (imported as a library)
        uses: actions/checkout@v4
        with:
          repository: saranshshankar/Replay-Framework
          ref: ${{ env.FRAMEWORK_REF }}
          path: replay-framework
          token: ${{ secrets.FRAMEWORK_READ_TOKEN }}   # read-only PAT (cross-org until repo moves in)

      # Log in to GHCR so `docker compose up --pull missing` can pull the planner image.
      # DOCKER_DEPLOYMENT_PAT is the org's EXISTING GHCR credential (the same one
      # v2-docker-ci.yml uses to push) — no AWS, no new secret. ECR is only a robot mirror.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_DEPLOYMENT_PAT }}

      - name: Install the framework
        run: pip install -e "./replay-framework/module_replay[metrics]"

      # The engine (~54 MiB) + LUTs are NOT in the Docker image — they are runtime assets the
      # container reads from the host ~/.ros (bind-mounted to /root/.ros). Download them per-run
      # (seconds) instead of maintaining a custom AMI (guide Part 10). Source = the S3 fixtures
      # bundle (Q-K); needs only an S3-READ OIDC role — NOT ECR (the image is GHCR).
      - name: Configure AWS (S3 READ on the asset + incident buckets)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.REPLAY_ROLE_ARN }}   # read on replay-framework-assets + incident bucket
          aws-region: ap-south-1
      - name: Stage engine + LUTs into ~/.ros (bind-mounted into the container)
        run: |
          mkdir -p ~/.ros/perception/models ~/.ros/perception/calibration/camera_intrinsics
          # Engine (EoMT). WARNING: s3://10xai-team-models/segmentation/semantic14/flicker_drywall.trt
          # is an ARM/Orin build — it will NOT deserialize on the x86 L4. Do NOT use it.
          # PERCEPTION_ENGINE_S3 must point at an x86 / sm_89 / TRT-10.3 build of the SAME model,
          # built once from the ONNX (guide Part 5a) and uploaded. aws s3 cp auto-resolves region.
          aws s3 cp "${{ vars.PERCEPTION_ENGINE_S3 }}" ~/.ros/perception/models/flicker_drywall.trt
          # LUTs → perception/calibration/camera_intrinsics/ (perception_sim.yaml:64). 6 cams (~85MB ea),
          # staged from the consolidated replay-framework-assets bucket (ap-south-1, job region).
          aws s3 sync \
            s3://replay-framework-assets/perception_assets/calibration/camera_intrinsics/ \
            ~/.ros/perception/calibration/camera_intrinsics/
          # Input bag — NOT in either prefix above; point PERCEPTION_BAG_S3 at the curated bag.
          aws s3 sync "${{ vars.PERCEPTION_BAG_S3 }}" "$BAG"

      - name: Verify GPU is visible
        run: nvidia-smi

      # ---------------------------------------------------------------------------
      # Headless-box pre-step (RESEARCH §2b — highest-risk first-run blocker).
      # The compose file carries devices: (robot serial/joystick), $XAUTHORITY / /etc/timezone /
      # /dev/log bind-mounts that do NOT exist on a fresh ephemeral EC2 runner.  Strip them before
      # replay-module starts Docker.
      # ---------------------------------------------------------------------------
      - name: Headless-box setup (reset devices, create host paths)
        run: |
          # Remove the `devices:` block from the compose override so Docker doesn't try to
          # bind-mount /dev/ttyUSB* / /dev/input/* that don't exist on the EC2 runner.
          # The override file is created by env_setup.py; seed it if not yet present.
          OVERRIDE="${TENXCODE_ROOT}/.devcontainer/v2/planner/docker-compose.override.yml"
          if [ -f "$OVERRIDE" ]; then
            python3 -c "
          import yaml, sys
          with open('$OVERRIDE') as f:
              doc = yaml.safe_load(f) or {}
          for svc in (doc.get('services') or {}).values():
              svc.pop('devices', None)
          with open('$OVERRIDE', 'w') as f:
              yaml.dump(doc, f, default_flow_style=False)
          "
          fi
          # /root/.Xauthority — required by xauth before the planner container starts
          touch /root/.Xauthority
          # /etc/timezone — some compose bind-mounts require it; create if absent
          [ -f /etc/timezone ] || echo "UTC" > /etc/timezone
          # log dirs expected by supervisord / the module launch
          mkdir -p /tmp/output/logs /tmp/output/replay_output

      # Pin the framework's version-spec to THIS PR's commit. The 10xCode tree is already
      # checked out at this SHA, so the framework's internal `git checkout` is a no-op that
      # preserves the PR's edits (e2e-2026-06-18, fix F5), then it builds + replays them.
      - name: Pin replay to this PR's commit
        run: |
          cat > /tmp/version.yaml <<EOF
          tenxcode:
            branch: ${{ github.event.pull_request.head.sha || github.sha }}
          EOF

      # ---------------------------------------------------------------------------
      # INCIDENT BRANCH (A4.1) — only when incidents are tagged on the PR.
      # Bags are resolved server-side from the RDS (B3: the DB is the authoritative source
      # of s3_bag_uri so the bucket-key layout is not duplicated in CI YAML).
      # Run ALL tagged bags (sharded, not fail-fast — D-18); AND-gate the verdicts below.
      # ---------------------------------------------------------------------------
      - name: "Incident branch: resolve s3_bag_uri for each tagged incident from RDS"
        id: resolve_bags
        if: needs.detect.outputs.incident_ids != ''
        env:
          INCIDENT_DB_URL: ${{ secrets.INCIDENT_DB_URL }}
          INCIDENT_IDS: ${{ needs.detect.outputs.incident_ids }}
        run: |
          # Server-side SELECT: DB creds never reach fork code (guard above + internal-branch check).
          # Emits /tmp/incident_bags.tsv: incident_id<TAB>s3_bag_uri per line.
          python3 - <<'EOF'
          import os, re, sys, subprocess, json
          raw_ids = os.environ['INCIDENT_IDS'].split()
          # Defense-in-depth (CR-01): only [A-Za-z0-9_-] IDs reach the SQL f-string
          # below. parse_ticked_incident_ids enforces this at the source; this guards
          # against any other producer of INCIDENT_IDS.
          ids = [i for i in raw_ids if re.fullmatch(r'[A-Za-z0-9_-]+', i)]
          if not ids:
              print("No incident IDs — golden branch")
              sys.exit(0)
          rows = []
          for iid in ids:
              # psql: one query per incident; SELECT s3_bag_uri from module_replay_incidents.
              sql = f"SELECT incident_id, s3_bag_uri FROM module_replay_incidents WHERE incident_id='{iid}';"
              result = subprocess.run(
                  ['psql', os.environ['INCIDENT_DB_URL'], '--no-psqlrc', '--tuples-only', '--no-align', '-c', sql],
                  capture_output=True, text=True, check=True
              )
              for line in result.stdout.strip().splitlines():
                  parts = line.split('|', 1)
                  if len(parts) == 2:
                      rows.append((parts[0].strip(), parts[1].strip()))
          with open('/tmp/incident_bags.tsv', 'w') as f:
              for iid, uri in rows:
                  f.write(f"{iid}\t{uri}\n")
          print(f"Resolved {len(rows)} incident bag(s)")
          EOF

      - name: "Incident branch: stage each incident bag from S3 (authoritative s3_bag_uri)"
        id: stage_incident_bags
        if: needs.detect.outputs.incident_ids != ''
        run: |
          mkdir -p /tmp/incident_bags
          while IFS=$'\t' read -r iid uri; do
            dest="/tmp/incident_bags/${iid}"
            mkdir -p "$dest"
            echo "Staging $iid from $uri"
            aws s3 cp --recursive "$uri" "$dest"
          done < /tmp/incident_bags.tsv

      - name: "Incident branch: replay each incident bag (sharded, not fail-fast — D-18; retry-on-INVALID)"
        id: replay_incident_bags
        if: needs.detect.outputs.incident_ids != ''
        env:
          INCIDENT_DB_URL: ${{ secrets.INCIDENT_DB_URL }}
          REPLAY_RETRIES: "2"   # N=2 retries when a bag's verdict is 'inconclusive' (INVALID replay — 01.2 Finding 3)
        run: |
          # Run ALL tagged incident bags (sharded, not fail-fast — D-18). Each bag's exit code is
          # captured separately; all run regardless of individual failures. The AND-gate is applied
          # in the next step from metrics.json verdict keys.
          #
          # RETRY-ON-INVALID (01.2 Finding 3): an 'inconclusive' verdict is the incident-branch
          # equivalent of an INVALID replay (a transient validity breach), NOT a real signature —
          # re-run up to N times so the `mark` AND-gate sees a definitive fixed/not_fixed verdict
          # and never blocks (or clears) a PR on infra noise. A crashed replay (no metrics.json)
          # yields an empty verdict and is NOT retried (the mark job treats non-'fixed' as blocking).
          attempts=$((REPLAY_RETRIES + 1))
          while IFS=$'\t' read -r iid uri; do
            out="/tmp/incident_out/${iid}"
            bag="/tmp/incident_bags/${iid}"
            for i in $(seq 1 "$attempts"); do
              echo "=== Replaying incident $iid (attempt ${i}/${attempts}) ==="
              rm -rf "$out"; mkdir -p "$out"
              cd replay-framework/module_replay
              # --incident-bag: the RDS-authoritative staged bag (the DB stays the single source
              # of truth for WHERE the bag is). --incident-id: stamps the verdict + triggers the
              # verify-against-ALL-detectors mode (D-21 — conditions come from config, not the RDS;
              # the gate runs the whole detector set and "fixed" == no detector trips).
              replay-module incident \
                --module "$MODULE" \
                --incident-bag "$bag" \
                --incident-id "$iid" \
                --output "$out" \
                --version-yaml /tmp/version.yaml || true   # collect all, AND-gate below
              cd "$GITHUB_WORKSPACE"
              verdict=$(python3 -c "import json; d=json.load(open('${out}/reports/metrics.json')); print((d.get('incident_verdict') or {}).get('verdict',''))" 2>/dev/null || echo "")
              if [ "$verdict" != "inconclusive" ]; then
                echo "incident $iid verdict=${verdict:-<none>} (definitive) — keeping."
                break
              fi
              echo "::warning::incident $iid inconclusive (INVALID replay) on attempt ${i}/${attempts} — retrying (01.2 Finding 3)."
            done
          done < /tmp/incident_bags.tsv

      # GOLDEN BRANCH (A4.2) — replays when NO incidents are tagged on the PR.
      # RETRY-ON-INVALID (01.2 Stage-A Finding 3): a transient ~500 ms stall on the depth /
      # colored_pointcloud topics yields an INVALID (validity-tier) verdict that is INFRA NOISE,
      # not a code regression (observed ~1-in-4 on the sim box; camera RGB/semantic never affected).
      # Re-run the replay up to N times until the RECORDED BAG IS VALID, so the downstream cheap
      # `metrics` job only ever sees a VALID bag and its red/green reflects QUALITY (a real
      # regression) — never a transient hiccup. A quality FAIL (metrics rc=1) is a REAL regression
      # and is kept immediately (never retried). Thresholds stay strict (owner: depth not yet
      # produced by perception; recalibration is a separate, Aniket-owned decision).
      - name: "Golden branch: replay this PR's perception (retry-on-INVALID → hand a VALID bag downstream)"
        if: needs.detect.outputs.incident_ids == ''
        env:
          REPLAY_RETRIES: "2"   # N=2 retries on INVALID → up to 3 attempts total
        run: |
          cd replay-framework/module_replay
          valid=0
          attempts=$((REPLAY_RETRIES + 1))
          for i in $(seq 1 "$attempts"); do
            echo "=== Golden replay attempt ${i}/${attempts} ==="
            rm -rf /tmp/output /tmp/validitycheck
            # Replay only (metrics stay in the cheap downstream job); writes /tmp/output/replay_output.
            # A setup/replay error (exit 3) is NOT a validity breach — let it fail fast (set -e).
            replay-module all --module "$MODULE" \
              --version-yaml /tmp/version.yaml \
              --local-bag "$BAG" \
              --output /tmp/output
            # Offline validity check: compute metrics and read the B9 exit code.
            #   0 = PASS, 1 = quality FAIL -> BOTH are VALID replays -> keep this bag
            #   2 = INVALID (validity breach, e.g. a transient stall) -> retry
            set +e
            replay-module metrics --module "$MODULE" \
              --bag /tmp/output/replay_output --output /tmp/validitycheck
            rc=$?
            set -e
            if [ "$rc" -ne 2 ]; then
              echo "Replay VALID (validity check rc=${rc}) — handing this bag to the metrics job."
              valid=1
              break
            fi
            echo "::warning::Golden replay INVALID (rc=2 validity breach) on attempt ${i}/${attempts} — retrying (01.2 Finding 3)."
          done
          if [ "$valid" -ne 1 ]; then
            echo "::error::No VALID replay in ${attempts} attempts — a PERSISTENT (not transient) validity breach. Failing the gate for a human to investigate the runner/infra (not the PR)."
            exit 1
          fi
          cd "$GITHUB_WORKSPACE"

      - uses: actions/upload-artifact@v4
        with:
          name: output-bag-${{ github.run_id }}
          path: /tmp/output/replay_output
          retention-days: 5
      - uses: actions/upload-artifact@v4
        if: always()                               # logs are the failure evidence
        with:
          name: logs-${{ github.run_id }}
          path: /tmp/output/logs
          retention-days: 5
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: incident-out-${{ github.run_id }}
          path: /tmp/incident_out
          retention-days: 5

  # ---------------------------------------------------------------------------
  # metrics — cheap CPU; GOLDEN BRANCH ONLY. Computes metrics.json and gates on
  # doc['pass'] for the untagged-golden path. The incident branch's AND-gate lives
  # in the `mark` job (which reads each incident_verdict), so metrics is skipped there.
  # ---------------------------------------------------------------------------
  metrics:
    needs: [detect, replay]
    if: needs.detect.outputs.incident_ids == ''
    runs-on: ubuntu-latest                         # cheap; no GPU, no ROS, no secrets
    steps:
      - name: Checkout the framework (metrics only)
        uses: actions/checkout@v4
        with:
          repository: saranshshankar/Replay-Framework
          ref: main
          token: ${{ secrets.FRAMEWORK_READ_TOKEN }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e "./module_replay[metrics]"
      - uses: actions/download-artifact@v4
        with:
          name: output-bag-${{ github.run_id }}
          path: /tmp/output/replay_output
      - name: Compute metrics + gate on the verdict (golden path — doc['pass'])
        run: |
          cd module_replay
          replay-module metrics --module perception \
            --bag /tmp/output/replay_output --output /tmp/metrics
          python -c "import json,sys; d=json.load(open('/tmp/metrics/reports/metrics.json')); sys.exit(0 if d['pass'] else 1)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ github.run_id }}
          path: /tmp/metrics/reports
          retention-days: 5

  # ---------------------------------------------------------------------------
  # mark — INCIDENT BRANCH ONLY; the incident AND-gate. Reads each per-incident
  # doc["incident_verdict"]["verdict"] (the VERDICT KEY — never a raw exit code;
  # T-0106-04 / B6), marks the "fixed" rows in the RDS, and FAILS the job (so the
  # required check goes red) if ANY tagged incident is not "fixed" (D-21).
  # NEVER marks fixed on not_fixed / inconclusive.
  # ---------------------------------------------------------------------------
  mark:
    needs: [detect, replay]
    if: >
      always() &&
      needs.replay.result != 'skipped' &&
      needs.detect.outputs.incident_ids != '' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      INCIDENT_DB_URL: ${{ secrets.INCIDENT_DB_URL }}
    steps:
      - name: Checkout the framework (for metrics.json schema + psql)
        uses: actions/checkout@v4
        with:
          repository: saranshshankar/Replay-Framework
          ref: main
          token: ${{ secrets.FRAMEWORK_READ_TOKEN }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e "./module_replay[metrics]"
      - uses: actions/download-artifact@v4
        id: dl_incident_out
        with:
          name: incident-out-${{ github.run_id }}
          path: /tmp/incident_out
        continue-on-error: true   # artifact may not exist on the golden branch
      - name: Mark fixed incidents in RDS (reads incident_verdict — never a raw exit code)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'EOF'
          import os, json, subprocess, pathlib, sys

          incident_out = pathlib.Path('/tmp/incident_out')
          if not incident_out.exists():
              print("No incident output — golden branch or no incidents; skipping mark step.")
              sys.exit(0)

          db_url = os.environ.get('INCIDENT_DB_URL', '')
          if not db_url:
              # No DB configured (infra not yet provisioned): still VERIFY + AND-gate from
              # metrics.json below; only the RDS UPDATE is skipped.
              print("INCIDENT_DB_URL not set — verifying verdicts only (no RDS mark).")

          pr_number = os.environ.get('PR_NUMBER', '')
          pr_sha    = os.environ.get('PR_SHA', '')
          run_id    = os.environ.get('RUN_ID', '')

          FIXED_VERDICT = 'fixed'

          marked = []
          not_fixed = []   # tagged incidents whose fix did NOT verify — these block the gate
          for metrics_file in sorted(incident_out.rglob('reports/metrics.json')):
              try:
                  doc = json.loads(metrics_file.read_text())
              except Exception as e:
                  print(f"WARN: could not parse {metrics_file}: {e}")
                  continue

              iv = doc.get('incident_verdict') or {}
              verdict  = iv.get('verdict', '')
              iid      = iv.get('incident_id') or metrics_file.parts[-3]  # fallback: <out>/<iid>/reports/metrics.json
              tripped  = iv.get('tripped') or []

              if verdict != FIXED_VERDICT:
                  # not_fixed (a known failure still present) or inconclusive (INVALID /
                  # uncomputable) — NEVER mark fixed (T-0106-04); record to block the gate.
                  print(f"NOT FIXED {iid}: verdict={verdict!r} tripped={tripped}")
                  not_fixed.append(iid)
                  continue

              if not db_url:
                  print(f"Would mark fixed (no DB): {iid}")
                  marked.append(iid)
                  continue

              # Idempotent UPDATE: only rows that are still open get updated (B6 / FR-8).
              # WHERE incident_id=$1 AND status<>'fixed' prevents double-writes. iid is
              # allowlisted at the parse_ticked_incident_ids source (CR-01).
              sql = (
                  f"UPDATE module_replay_incidents "
                  f"SET status='fixed', fixed=true, "
                  f"    fixed_by_pr='{pr_number}', "
                  f"    fixed_by_sha='{pr_sha}', "
                  f"    fixed_by_run='{run_id}', "
                  f"    fixed_at=now() "
                  f"WHERE incident_id='{iid}' AND status<>'fixed';"
              )
              result = subprocess.run(
                  ['psql', db_url, '--no-psqlrc', '--tuples-only', '-c', sql],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"ERROR marking {iid}: {result.stderr}")
              else:
                  print(f"Marked fixed: {iid}")
                  marked.append(iid)

          print(f"Total marked fixed: {len(marked)}")
          # The incident AND-gate (D-21): any tagged incident not 'fixed' fails the check.
          if not_fixed:
              print(f"GATE FAIL: {len(not_fixed)} incident(s) not fixed: {not_fixed}")
              sys.exit(1)
          EOF

  # ---------------------------------------------------------------------------
  # gate — the single required check for branch protection (if: always()).
  # One job under the gate context name so branch protection never changes.
  # ---------------------------------------------------------------------------
  gate:
    needs: [detect, replay, metrics, mark]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Single required check for branch protection
        run: |
          {
            echo "### Perception replay gate"
            echo "Artifacts (5-day retention) on [this run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}):"
            echo "- \`logs-${{ github.run_id }}\` — recorder.log + module.log (look here first on a failure)"
            echo "- \`report-${{ github.run_id }}\` — report.html + metrics.json"
            echo "- \`incident-out-${{ github.run_id }}\` — per-incident reports (incident branch only)"
          } >> "$GITHUB_STEP_SUMMARY"
          REPLAY="${{ needs.replay.result }}"
          METRICS="${{ needs.metrics.result }}"
          MARK="${{ needs.mark.result }}"
          INCIDENTS="${{ needs.detect.outputs.incident_ids }}"
          # Neutral pass when the perception path was untouched (detect → replay skipped).
          if [ "$REPLAY" = "skipped" ]; then
            echo "Perception path untouched — neutral pass."
            exit 0
          fi
          [ "$REPLAY" = "success" ] || { echo "Replay failed."; exit 1; }
          if [ -n "$INCIDENTS" ]; then
            # Incident branch: the mark job IS the AND-gate (fails if any tagged incident
            # is not 'fixed'). metrics is skipped on this branch (D-21).
            [ "$MARK" = "success" ] || { echo "One or more tagged incidents are not fixed."; exit 1; }
          else
            # Golden branch: the metrics job gates on doc['pass'].
            [ "$METRICS" = "success" ] || { echo "Golden quality gate failed."; exit 1; }
          fi
